server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Раздача статики (Frontend)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API запросов на бэкенд контейнер
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Проксирование статики бэкенда (если есть загруженные файлы)
    location /static {
        proxy_pass http://backend:8000;
    }

    # Для WebRTC (опционально, если будут сокеты на том же порту)
    # Но для WebRTC лучше использовать отдельные порты/сервисы
}
