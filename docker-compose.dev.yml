services:
  db:
    image: postgres:16-alpine
    container_name: peddler-db-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - peddler-dev-network

  redis:
    image: redis:7-alpine
    container_name: peddler-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - peddler-dev-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peddler-backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Переопределяем только Docker-специфичные значения
      DB_HOST: db
      REDIS_URL: redis://redis:6379
      APP_NAME: Peddler Dev
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:ro
    command: >
      sh -c "alembic upgrade head && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug"
    networks:
      - peddler-dev-network

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  peddler-dev-network:
    driver: bridge
