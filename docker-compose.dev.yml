# docker-compose.dev.yml
services:
  db:
    image: postgres:16-alpine
    container_name: peddler-db-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5m
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - peddler-dev-network

  redis:
    image: redis:7-alpine
    container_name: peddler-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_dev_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5m
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - peddler-dev-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peddler-backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
      - backend/.env
    environment:
      # ===== Переопределяет для Docker =====
      DB_HOST: db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      USE_REDIS_PUBSUB: "true"
      APP_NAME: Peddler Dev
      DEBUG: "true"
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:ro
    command: >
      sh -c "alembic upgrade head && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 5m
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - peddler-dev-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peddler-celery-worker-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
      - backend/.env
    environment:
      APP_NAME: Peddler Celery Worker
      DEBUG: "true"
    volumes:
      - ./uploads:/app/uploads
      - ./backend/app:/app/app:ro
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    networks:
      - peddler-dev-network

  tusd:
    image: tusproject/tusd:latest
    container_name: peddler-tusd
    restart: unless-stopped
    ports:
      - "1080:1080" # Порт для Tus протокола
    volumes:
      # Важно: монтируем ту же папку uploads, что и у бэкенда!
      # tusd будет писать в /srv/tusd-data (внутри контейнера),
      # а мы пробросим это в ./uploads/tus (на хосте)
      - ./uploads/tus:/srv/tusd-data
    command: >
      -host=0.0.0.0 
      -port=1080 
      -upload-dir=/srv/tusd-data 
      -hooks-http=http://backend:8000/api/v1/internal/tus-hook 
      -hooks-http-retry=3 
      -hooks-http-backoff=1s
      -hooks-enabled-events=post-finish
    networks:
      - peddler-dev-network
    depends_on:
      - backend # Бэкенд должен быть готов принимать хуки

  # celery-beat:
