version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: peddler-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-peddler}
      POSTGRES_PASSWORD: ${DB_PASS:-secret_password_change_me}
      POSTGRES_DB: ${DB_NAME:-peddler}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-peddler}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - peddler-network

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: peddler-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - peddler-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peddler-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # App
      APP_NAME: ${APP_NAME:-Peddler}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-false}

      # Server
      HOST: 0.0.0.0
      PORT: 8000

      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-peddler}
      DB_PASS: ${DB_PASS:-secret_password_change_me}
      DB_NAME: ${DB_NAME:-peddler_db}
      DB_ECHO: ${DB_ECHO:-false}

      # JWT
      SECRET_KEY: ${SECRET_KEY:-super_secret_key_change_in_production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080

      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      CORS_CREDENTIALS: true

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      USE_REDIS_PUBSUB: true

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Для hot-reload в dev режиме (закомментировать в проде)
      # - ./backend/app:/app/app
      - backend_logs:/app/logs
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${WORKERS:-4}
      --log-level ${LOG_LEVEL:-info}
    networks:
      - peddler-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    name: peddler-postgres-data
  redis_data:
    name: peddler-redis-data
  backend_logs:
    name: peddler-backend-logs

networks:
  peddler-network:
    name: peddler-network
    driver: bridge
