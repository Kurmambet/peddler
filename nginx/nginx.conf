user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 500M; # Разрешаем загрузку тяжелых файлов

    upstream backend { server backend:8000; }
    upstream tusd { server tusd:1080; }

    # Редирект с HTTP на HTTPS
    server {
        listen 80;
        server_name hushme.fun www.hushme.fun;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name hushme.fun www.hushme.fun;

        # Пути к сертификатам, которые сгенерировал Certbot на хосте
        ssl_certificate /etc/letsencrypt/live/hushme.fun/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hushme.fun/privkey.pem;

        # Оптимизация SSL
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Раздача медиа в обход Python
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /files/ {
            proxy_pass http://tusd;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off; # Критично для TUS протокола
        }
    }
}
