user nginx;
worker_processes auto;

events {
    # Максимальное количество соединений на один рабочий процесс
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Скрываем версию nginx в заголовках ответов (для безопасности)
    server_tokens off;

    # Оптимизация отдачи файлов и сети
    sendfile on;
    tcp_nopush on;

    # Сжатие текстовых данных (ускоряет загрузку фронтенда в несколько раз)
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Таймауты для защиты от медленных DDoS-атак (Slowloris)
    client_body_timeout   12;
    client_header_timeout 12;
    keepalive_timeout     15;
    send_timeout          10;

    client_max_body_size 500M; # Разрешаем загрузку тяжелых файлов

    # --- Зоны Rate Limiting и лимитов соединений ---
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    
    # Лимиты частоты запросов
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;     # 30 запросов в секунду для API
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;     # 5 запросов в МИНУТУ для авторизации (брутфорс)
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=2r/m;  # 2 загрузки в минуту

    limit_req_status 429;
    limit_conn_status 429;

    # --- Апстримы ---
    upstream backend { server backend:8000; }    
    upstream tusd { server tusd:1080; }

    # Редирект с HTTP на HTTPS
    server {
        listen 80;
        server_name hushme.fun www.hushme.fun;
        return 301 https://$host$request_uri;    
    }

    # Основной HTTPS сервер
    server {
        listen 443 ssl http2;
        server_name hushme.fun www.hushme.fun;

        # Пути к сертификатам, которые сгенерировал Certbot на хосте
        ssl_certificate /etc/letsencrypt/live/hushme.fun/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hushme.fun/privkey.pem;

        # --- Оптимизация и безопасность SSL ---
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_protocols TLSv1.2 TLSv1.3;
        
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 1.1.1.1 valid=300s;
        resolver_timeout 5s;

        # --- Базовые HTTP Security Headers ---
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "microphone=(), camera=()" always;

        # Ограничение подключений
        limit_conn conn_limit 20;

        # Отдача фронтенда
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;        
        }

        # Раздача медиа в обход Python
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
        }

        # Защита эндпоинта авторизации от брутфорса
        location /api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;
            
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket (сохранение соединения)
        location /api/v1/ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Увеличиваем таймауты, чтобы Nginx не обрывал "тихие" вебсокеты
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Проксирование остального API
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Загрузка файлов
        location /files/ {
            limit_req zone=uploads burst=5 nodelay;

            proxy_pass http://tusd;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off; # Критично для TUS протокола
        }
    }
}
